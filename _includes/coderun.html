<div class="CodeRun" style="overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2);  border-radius: 12px; background: #f5f5f5;">
  <div class="mac-titlebar"
    style="background: #e0e0e0; height: 32px; display: flex; align-items: center; padding: 0 12px; gap: 8px;">
    <span
      style="width: 12px; height: 12px; border-radius: 50%; background-color: #ff5f56; display: inline-block;"></span>
    <span
      style="width: 12px; height: 12px; border-radius: 50%; background-color: #ffbd2e; display: inline-block;"></span>
    <span
      style="width: 12px; height: 12px; border-radius: 50%; background-color: #27c93f; display: inline-block;"></span>
  </div>
  <div>
    <iframe src="/cases/{{include.id}}?embeded=1" style="width: 100%; aspect-ratio: 16 / 9; border: none;"></iframe>
  </div>
  {% if include.title %}
  <h6 class="CodeRun-title">{{include.title}}</h6>
  {% endif %}
</div>

title: ThreeJs Learning Plan
email: zhangxinghai79@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Welcome to THREE.JS Leaning World.

baseurl: "" # the subpath of your site, e.g. /blog
url: "http://threelearning.zhangxinghai.cn" # the base hostname & protocol for your site, e.g. http://example.com
host: 0.0.0.0

permalink: "/posts/:year:month/:title"

webrick:
  headers:
    Cache-Control: no-store, no-cache, must-revalidate

sass:
  style: compressed

include:
  - cases/**/*.md
  - cases/*.js
  - courses/**/*.md

keep_files:
  - _cases

exclude:
  - tsconfig.json
  - package.json
  - yarn.lock
  - scripts

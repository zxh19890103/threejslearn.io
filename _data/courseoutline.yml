course:
  title: WebGL and Three.js Tutorial
  parts:
    - title: "激發興趣（引導與思辨）"
      level: "motivation"
      title_en: "Sparking Interest (Introduction and Critical Thinking)"
      chapters:
        - title: "前言"
          title_en: "Introduction"
          filename: "intro"
          progress: "done"
        - title: "世界、眼睛與內心"
          title_en: "The World, Our Eyes, and Mind"
          filename: "world-and-eyes"
          progress: "doing"
        - title: "顏色、空間與時間"
          title_en: "Color, Space, and Time"
          filename: "color-space-time"
          progress: "doing"
        - title: "大腦如何建構空間與感受運動"
          title_en: "How the Brain Constructs Space and Perceives Motion"
          filename: "brain-space-motion"
          progress: "doing"
        - title: "WebGL：虛擬與真實之間的橋樑"
          title_en: "WebGL: Bridging Virtual and Reality"
          filename: "webgl-virtual-reality-bridge"
          progress: "doing"
        - title: "Shader：像素的雕刻刀"
          title_en: "Shader: The Sculpting Knife of Pixels"
          filename: "shader-pixel-sculpting"
        - title: "思考：我們為何要用程式建構世界？"
          title_en: "Why Build Worlds with Code?"
          filename: "why-build-worlds-with-code"

    - title: "相關數學基礎（圖形數學）"
      level: "math"
      title_en: "Mathematical Foundations (Graphics Math)"
      chapters:
        - title: "坐標系統與向量基礎（笛卡爾與齊次坐標）"
          title_en: "Coordinate Systems and Vector Basics (Cartesian and Homogeneous)"
          filename: "coordinate-systems-vectors"
        - title: "向量與矩陣：移動、旋轉與縮放"
          title_en: "Vectors and Matrices: Translation, Rotation, and Scaling"
          filename: "vectors-matrices-transformations"
        - title: "投影矩陣與透視投影原理"
          title_en: "Projection Matrices and Perspective Projection Principles"
          filename: "projection-matrices-perspective"
        - title: "法向量與光照基礎"
          title_en: "Normal Vectors and Lighting Basics"
          filename: "normal-vectors-lighting"
        - title: "曲線、曲面與動畫插值初探"
          title_en: "Curves, Surfaces, and Animation Interpolation"
          filename: "curves-surfaces-animation"
        - title: "線性代數在圖形學中的直觀解釋"
          title_en: "Intuitive Linear Algebra in Graphics"
          filename: "linear-algebra-graphics"

    - title: "WebGL 簡介"
      title_en: "Introduction to WebGL"
      level: "webgl"
      chapters:
        - title: "WebGL 是什麼？"
          title_en: "What is WebGL?"
          filename: "what-is-webgl"
        - title: "OpenGL 與 WebGL 的關係"
          title_en: "Relationship Between OpenGL and WebGL"
          filename: "opengl-webgl-relationship"
        - title: "頂點與片段著色器概念"
          title_en: "Vertex and Fragment Shader Concepts"
          filename: "vertex-fragment-shaders"
        - title: "GLSL 編寫與調試基礎"
          title_en: "GLSL Writing and Debugging Basics"
          filename: "glsl-basics"
        - title: "如何在 Canvas 上畫出三角形"
          title_en: "Drawing a Triangle on Canvas"
          filename: "draw-triangle-canvas"
        - title: "WebGL 的繪圖管線與狀態管理"
          title_en: "WebGL Rendering Pipeline and State Management"
          filename: "webgl-pipeline-state"

    - title: "Three.js 基礎篇"
      level: "basic"
      title_en: "Three.js Fundamentals"
      chapters:
        - title: "建立場景與渲染器"
          title_en: "Creating Scenes and Renderers"
          filename: "scenes-and-renderers"
        - title: "相機與控制器"
          title_en: "Cameras and Controls"
          filename: "cameras-and-controls"
        - title: "幾何體與材質"
          title_en: "Geometries and Materials"
          filename: "geometries-and-materials"
        - title: "光源與陰影"
          title_en: "Lights and Shadows"
          filename: "lights-and-shadows"
        - title: "動畫與 requestAnimationFrame"
          title_en: "Animation and requestAnimationFrame"
          filename: "animation-requestanimationframe"
        - title: "滑鼠互動與 Raycaster"
          title_en: "Mouse Interaction and Raycaster"
          filename: "mouse-interaction-raycaster"
        - title: "載入模型與貼圖"
          title_en: "Loading Models and Textures"
          filename: "loading-models-textures"

    - title: "Three.js 高級篇"
      level: "advance"
      title_en: "Advanced Three.js"
      chapters:
        - title: "自訂 Shader 與 ShaderMaterial"
          title_en: "Custom Shaders and ShaderMaterial"
          filename: "custom-shaders-shadermaterial"
        - title: "粒子系統與特效"
          title_en: "Particle Systems and Effects"
          filename: "particle-systems-effects"
        - title: "後處理與視覺風格"
          title_en: "Post-Processing and Visual Styles"
          filename: "post-processing-visual-styles"
        - title: "場景拆分與性能優化"
          title_en: "Scene Optimization and Performance"
          filename: "scene-optimization-performance"
        - title: "互動作品與案例實作"
          title_en: "Interactive Projects and Case Studies"
          filename: "interactive-projects-case-studies"
